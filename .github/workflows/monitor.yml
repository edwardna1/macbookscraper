# Manual run anytime + auto every 10 min (offset cron to avoid GitHub load spikes).
# Persistence: GitHub Actions cache (no git push needed).
# Repo secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
name: Refurb Monitor
on:
  workflow_dispatch:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"   # every 10 min, offset from :00

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: apple-refurb-monitor
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Restore seen state
        uses: actions/cache@v4
        with:
          path: seen_products.json
          key: apple-refurb-seen-v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --once
