# Manual run anytime + auto every 10 min (offset cron to avoid GitHub load spikes).
# Repo secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
name: Refurb Monitor
on:
  workflow_dispatch:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"   # every 10 min, offset from :00

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: apple-refurb-monitor
      cancel-in-progress: true

    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run monitor once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --once
      - name: Persist seen state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git"
          git add -f seen_products.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: update seen_products.json" && git push origin main)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
